name: Docker Build & Push

# Déclenchement : chaque push sur la branche main
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code source
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Connexion à Docker Hub avec les secrets GitHub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Configurer Docker Buildx (build multi-plateforme + cache)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Build ET push de l'image avec deux tags :
      #    - SHA du commit (immuable, traçable)
      #    - latest (toujours la dernière version de main)
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            fadloulahi14/music221:${{ github.sha }}
            fadloulahi14/music221:latest
          # Cache GitHub Actions pour accélérer les builds suivants
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 5. Message de succès avec le SHA du commit
      - name: Success — image pushed
        run: |
          echo "✅ Image Docker poussée avec succès !"
          echo ""
          echo "Tags publiés sur Docker Hub :"
          echo "  → fadloulahi14/music221:${{ github.sha }}"
          echo "  → fadloulahi14/music221:latest"
          echo ""
          echo "Commit : ${{ github.sha }}"
          echo "Branche : ${{ github.ref_name }}"
          echo "Déclenché par : ${{ github.actor }}"
